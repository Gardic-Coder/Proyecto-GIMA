services:
  app:
    build:
      context: ./backend # IMPORTANTE: Indica que el Dockerfile está dentro de la carpeta backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html # Sincroniza tu carpeta local con el contenedor
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env # Usa el archivo .env que está dentro de backend

  # La base de datos (PostgreSQL)
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jF2811
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita que los archivos locales sobrescriban las librerías del contenedor
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api # URL para que el navegador encuentre el backend
    depends_on:
      - app

volumes:
  postgres_data:


